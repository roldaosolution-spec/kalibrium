name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      # SHA fixo — evita supply chain attack por tag mutável
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2e # v2.32.0
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis, pcntl, bcmath, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Pint (lint)
        run: ./vendor/bin/pint --test

  analyse:
    name: Análise Estática (PHPStan level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2e # v2.32.0
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis, pcntl, bcmath, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env e gerar chave
        run: cp .env.example .env && php artisan key:generate

      - name: Run PHPStan (level 8)
        run: ./vendor/bin/phpstan analyse --no-progress

  refactor-check:
    name: Rector (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2e # v2.32.0
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, pcntl, bcmath, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Rector dry-run
        run: ./vendor/bin/rector --dry-run --no-progress-bar

  test:
    name: Testes (Pest)
    runs-on: ubuntu-latest

    services:
      pgsql:
        image: postgres:18-alpine
        env:
          # CI only — not for production. Production credentials must use GitHub Secrets.
          POSTGRES_DB: kalibrium_test
          POSTGRES_USER: kalibrium
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2e # v2.32.0
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis, pcntl, bcmath, intl
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configurar .env de teste
        run: cp .env.example .env && php artisan key:generate
        env:
          APP_DEBUG: "false"
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: kalibrium_test
          DB_USERNAME: kalibrium   # CI only — not for production; use GitHub Secrets instead
          DB_PASSWORD: secret      # CI only — not for production; use GitHub Secrets instead
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SESSION_ENCRYPT: "true"
          SESSION_DRIVER: array

      - name: Executar migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: kalibrium_test
          DB_USERNAME: kalibrium   # CI only — not for production; use GitHub Secrets instead
          DB_PASSWORD: secret      # CI only — not for production; use GitHub Secrets instead

      - name: Executar testes (Pest) com cobertura
        run: ./vendor/bin/pest --coverage-json=coverage/coverage.json --min=80
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: kalibrium_test
          DB_USERNAME: kalibrium   # CI only — not for production; use GitHub Secrets instead
          DB_PASSWORD: secret      # CI only — not for production; use GitHub Secrets instead
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SESSION_DRIVER: array

      - name: Verificar cobertura de domínios críticos (ADR-0017)
        run: php scripts/check-critical-coverage.php coverage/coverage.json

      - name: Upload artefato de cobertura
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-assets:
    name: Build Assets (Vite 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets (Vite 8)
        run: npm run build
